<body>
    <div class="container">
        <!-- 히어로 섹션 -->
        <section class="hero">
            <h1 class="hero-title">직장인 문구 생성기</h1>
            <p class="hero-subtitle">
                오늘도 출근한 당신을 위한<br>
                <span class="highlight-mint">현실 공감</span> vs <span class="highlight-pink">귀여운 막내</span>
            </p>
        </section>

        <!-- 버튼 영역 -->
        <section class="button-section">
            <h2 class="section-title">어떤 문구를 뽑아볼까요?</h2>

            <div class="button-grid">
                <!-- 현실 직장인 버튼 -->
                <button class="phrase-btn btn-workplace" id="btnWorkplace">
                    <div class="btn-icon">💼</div>
                    <div class="btn-content">
                        <div class="btn-title">현실 직장인</div>
                        <div class="btn-desc">찐 공감 푸념</div>
                    </div>
                </button>

                <!-- 귀여운 막내 버튼 -->
                <button class="phrase-btn btn-maknae" id="btnMaknae">
                    <div class="btn-icon">💕</div>
                    <div class="btn-content">
                        <div class="btn-title">귀여운 막내</div>
                        <div class="btn-desc">애교 문구</div>
                    </div>
                </button>
            </div>
        </section>

        <!-- 카드 출력 영역 -->
        <section class="card-section" id="cardSection" style="display: none;">
            <div class="card-wrapper">
                <div class="phrase-card" id="phraseCard">
                    <p class="card-text" id="cardText">문구가 여기 표시됩니다</p>
                    <div class="card-credit">- 직장인 문구 생성기 -</div>
                </div>
            </div>

            <!-- 액션 버튼 -->
            <div class="action-bar">
                <button class="action-btn btn-refresh" id="btnRefresh">
                    🔄 다시 뽑기
                </button>
                <button class="action-btn btn-download" id="btnDownload">
                    💾 이미지 저장
                </button>
            </div>

            <!-- 공유 버튼 섹션 -->
            <div class="share-section">
                <button class="share-btn-single" id="btnShare">
                    <span class="share-icon">📤</span>
                    <span class="share-text">공유하기</span>
                </button>
            </div>
        </section>

        <!-- 피드백 영역 -->
        <footer class="feedback-section">
            <button class="feedback-toggle" id="feedbackToggle">
                📝 피드백 남기기
            </button>
            <div class="feedback-form" id="feedbackForm" style="display: none;">
                <h3 class="feedback-title">의견을 들려주세요!</h3>
                <textarea id="feedbackText" placeholder="추가했으면 하는 문구나 개선사항을 자유롭게 남겨주세요 😊" maxlength="500"></textarea>
                <div class="feedback-actions">
                    <button class="btn-submit" id="btnSubmit">전송하기</button>
                    <button class="btn-cancel" id="btnCancel">취소</button>
                </div>
            </div>
        </footer>

        <!-- 하단 정보 -->
        <div class="footer-info">
            <p>Made with 💚 for 직장인</p>
            <p class="footer-copyright">© 2026 직장인 문구 생성기</p>
            <p class="footer-ai">이 콘텐츠는 Claude로 제작되었습니다</p>

        </div>
    </div>
</body>


</html>
